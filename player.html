<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#0d0d0d">
<meta name="color-scheme" content="dark">

<!-- PWA / "add to home screen" support -->
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Rádio FM">
<meta name="description" content="Player da Rádio FM — transmitindo ao vivo 24 horas por dia.">

<title>Player • Rádio FM</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<style>
  :root{
    --bg-0:#0a0a0a;
    --bg-1:#161616;
    --bg-2:#1e1e1e;
    --accent:#ff0033;
    --accent-dim:#ff003355;
    --text:#ffffff;
    --text-dim:#9a9a9a;
    --radius-lg:28px;
    --radius-md:18px;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
    --safe-left: env(safe-area-inset-left, 0px);
    --safe-right: env(safe-area-inset-right, 0px);
  }

  *{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
    -webkit-tap-highlight-color:transparent;
  }

  html,body{
    height:100%;
    overscroll-behavior:none;
  }

  body{
    min-height:100dvh;
    background:radial-gradient(circle at 50% 0%, var(--bg-1), var(--bg-0) 70%);
    color:var(--text);
    display:flex;
    justify-content:center;
    align-items:center;
    padding:
      calc(20px + var(--safe-top))
      calc(16px + var(--safe-right))
      calc(20px + var(--safe-bottom))
      calc(16px + var(--safe-left));
  }

  .player{
    width:100%;
    max-width:380px;
    background:rgba(30,30,30,.9);
    backdrop-filter:blur(20px);
    -webkit-backdrop-filter:blur(20px);
    border:1px solid rgba(255,255,255,.06);
    border-radius:var(--radius-lg);
    padding:clamp(20px, 6vw, 32px);
    box-shadow:0 20px 60px rgba(0,0,0,.55);
    text-align:center;
  }

  .logo{
    font-size:clamp(32px, 8vw, 42px);
    color:var(--accent);
    margin-bottom:14px;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:6px;
  }

  .logo span{
    font-size:clamp(14px, 3.6vw, 17px);
    font-weight:700;
    letter-spacing:3px;
    color:var(--text);
  }

  .cover{
    width:min(240px, 55vw);
    height:min(240px, 55vw);
    margin:0 auto;
    border-radius:var(--radius-md);
    overflow:hidden;
    box-shadow:0 15px 40px rgba(0,0,0,.45);
    background:var(--bg-2);
    position:relative;
  }

  .cover img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
  }

  .live{
    margin-top:18px;
    display:inline-flex;
    align-items:center;
    gap:6px;
    background:var(--accent);
    padding:7px 16px;
    border-radius:50px;
    font-size:clamp(11px, 3vw, 13px);
    font-weight:700;
    letter-spacing:1px;
  }

  .live .dot{
    width:7px;
    height:7px;
    border-radius:50%;
    background:#fff;
    animation:pulse 1.4s infinite;
  }

  @keyframes pulse{
    0%,100%{opacity:.5;}
    50%{opacity:1;}
  }

  .music{
    margin-top:20px;
    font-size:clamp(18px, 5vw, 22px);
    font-weight:700;
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
  }

  .artist{
    color:var(--text-dim);
    margin-top:6px;
    font-size:clamp(13px, 3.6vw, 14px);
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
  }

  .equalizer{
    display:flex;
    justify-content:center;
    align-items:flex-end;
    gap:5px;
    height:32px;
    margin:22px 0;
    opacity:.35;
    transition:opacity .3s ease;
  }

  .equalizer.active{ opacity:1; }

  .equalizer span{
    width:5px;
    background:var(--accent);
    border-radius:10px;
    height:8px;
    animation:none;
  }

  .equalizer.active span{
    animation:equalizer .9s infinite ease-in-out;
  }

  .equalizer span:nth-child(2){animation-delay:.1s;}
  .equalizer span:nth-child(3){animation-delay:.3s;}
  .equalizer span:nth-child(4){animation-delay:.5s;}
  .equalizer span:nth-child(5){animation-delay:.2s;}

  @keyframes equalizer{
    0%{height:8px;}
    50%{height:30px;}
    100%{height:12px;}
  }

  .controls{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:clamp(16px, 6vw, 26px);
    margin-top:6px;
  }

  button{
    border:none;
    cursor:pointer;
    background:none;
    color:inherit;
    touch-action:manipulation;
  }

  .play{
    width:72px;
    height:72px;
    min-width:44px;
    min-height:44px;
    border-radius:50%;
    background:var(--accent);
    color:#fff;
    font-size:26px;
    display:flex;
    align-items:center;
    justify-content:center;
    transition:transform .2s ease, box-shadow .2s ease;
    box-shadow:0 8px 24px var(--accent-dim);
  }

  .play:active{
    transform:scale(.94);
  }

  .play[disabled]{
    opacity:.6;
    cursor:wait;
  }

  .icon{
    width:44px;
    height:44px;
    display:flex;
    align-items:center;
    justify-content:center;
    color:var(--text-dim);
    font-size:20px;
    border-radius:50%;
    transition:color .2s ease, background .2s ease;
  }

  .icon:active{
    background:rgba(255,255,255,.08);
    color:var(--text);
  }

  .volume{
    margin-top:26px;
    display:flex;
    align-items:center;
    gap:10px;
  }

  input[type=range]{
    accent-color:var(--accent);
    width:100%;
    height:22px;
    cursor:pointer;
  }

  .status{
    margin-top:16px;
    font-size:12px;
    color:var(--text-dim);
    min-height:16px;
  }

  .status.error{
    color:var(--accent);
  }

  .footer{
    margin-top:22px;
    font-size:12px;
    color:var(--text-dim);
  }

  /* Small phones */
  @media (max-width:340px){
    .player{ padding:18px; }
    .controls{ gap:14px; }
  }

  /* Short / landscape viewports (common in embedded webviews) */
  @media (max-height:640px){
    .cover{ width:120px; height:120px; }
    .equalizer{ margin:14px 0; height:24px; }
    .volume{ margin-top:16px; }
    .footer{ margin-top:14px; }
  }

  /* Respect reduced motion preference */
  @media (prefers-reduced-motion: reduce){
    .live .dot, .equalizer span{ animation:none !important; }
  }
</style>
</head>

<body>

<main class="player">

  <div class="logo">
    <i class="fa-solid fa-radio" aria-hidden="true"></i>
    <span>RÁDIO FM</span>
  </div>

  <div class="cover">
    <img src="https://images.unsplash.com/photo-1493225457124-a3eb161ffa5f?w=700" alt="Capa da Rádio FM" loading="lazy">
  </div>

  <div class="live">
    <span class="dot" aria-hidden="true"></span>
    AO VIVO
  </div>

  <div class="music" id="music">Rádio FM</div>
  <div class="artist" id="artist">Sua melhor companhia.</div>

  <div class="equalizer" id="equalizer" aria-hidden="true">
    <span></span><span></span><span></span><span></span><span></span>
  </div>

  <div class="controls">
    <button class="icon" id="muteBtn" aria-label="Silenciar" aria-pressed="false">
      <i class="fa-solid fa-volume-low" aria-hidden="true"></i>
    </button>

    <button class="play" id="play" aria-label="Reproduzir" aria-pressed="false">
      <i class="fa-solid fa-play" aria-hidden="true"></i>
    </button>

    <button class="icon" id="maxVolBtn" aria-label="Volume máximo">
      <i class="fa-solid fa-volume-high" aria-hidden="true"></i>
    </button>
  </div>

  <div class="volume">
    <input type="range" id="volume" min="0" max="100" value="70" aria-label="Volume">
  </div>

  <p class="status" id="status" role="status" aria-live="polite">Toque em play para ouvir</p>

  <div class="footer">Transmitindo 24 horas por dia</div>

  <audio id="radio" preload="none">
    <source src="https://usa13.fastcast4u.com/proxy/radioativa?mp=/1" type="audio/mpeg">
  </audio>

</main>

<script>
(() => {
  const audio      = document.getElementById('radio');
  const playBtn     = document.getElementById('play');
  const playIcon     = playBtn.querySelector('i');
  const volumeSlider  = document.getElementById('volume');
  const muteBtn     = document.getElementById('muteBtn');
  const maxVolBtn    = document.getElementById('maxVolBtn');
  const equalizer    = document.getElementById('equalizer');
  const statusEl     = document.getElementById('status');

  let isPlaying = false;
  let lastVolume = 0.7;

  audio.volume = 0.7;

  function setStatus(text, isError = false){
    statusEl.textContent = text;
    statusEl.classList.toggle('error', isError);
  }

  function setPlayingUI(playing){
    isPlaying = playing;
    playIcon.className = playing ? 'fa-solid fa-pause' : 'fa-solid fa-play';
    playBtn.setAttribute('aria-label', playing ? 'Pausar' : 'Reproduzir');
    playBtn.setAttribute('aria-pressed', String(playing));
    equalizer.classList.toggle('active', playing);
  }

  async function togglePlay(){
    if (isPlaying){
      audio.pause();
      setPlayingUI(false);
      setStatus('Pausado');
      return;
    }

    playBtn.disabled = true;
    setStatus('Conectando...');

    // Cache-bust so a live stream reconnects fresh instead of resuming a
    // stale buffer, WITHOUT discarding the original query string (?mp=/1),
    // which the streaming server needs to pick the right stream.
    const sourceEl = audio.querySelector('source');
    const baseSrc = sourceEl.dataset.baseSrc || (sourceEl.dataset.baseSrc = sourceEl.src);
    const separator = baseSrc.includes('?') ? '&' : '?';
    sourceEl.src = `${baseSrc}${separator}_=${Date.now()}`;
    audio.load();

    // Safety timeout: if the stream never starts, stop the spinner and
    // tell the user, instead of "thinking" forever.
    const connectTimeout = setTimeout(() => {
      if (!isPlaying){
        setPlayingUI(false);
        setStatus('Não foi possível conectar ao stream', true);
        playBtn.disabled = false;
      }
    }, 12000);

    try {
      await audio.play();
      clearTimeout(connectTimeout);
      setPlayingUI(true);
      setStatus('Ao vivo agora');
    } catch (err) {
      clearTimeout(connectTimeout);
      setPlayingUI(false);
      setStatus('Não foi possível conectar ao stream', true);
    } finally {
      playBtn.disabled = false;
    }
  }

  playBtn.addEventListener('click', togglePlay);

  audio.addEventListener('waiting', () => setStatus('Carregando...'));
  audio.addEventListener('playing', () => setStatus('Ao vivo agora'));
  audio.addEventListener('error', () => {
    setPlayingUI(false);
    setStatus('Erro na transmissão. Tente novamente.', true);
  });

  volumeSlider.addEventListener('input', () => {
    const v = Number(volumeSlider.value) / 100;
    audio.volume = v;
    audio.muted = v === 0;
    muteBtn.setAttribute('aria-pressed', String(v === 0));
    muteBtn.querySelector('i').className = v === 0
      ? 'fa-solid fa-volume-xmark'
      : 'fa-solid fa-volume-low';
    if (v > 0) lastVolume = v;
  });

  muteBtn.addEventListener('click', () => {
    if (audio.muted || audio.volume === 0){
      audio.muted = false;
      audio.volume = lastVolume || 0.7;
      volumeSlider.value = Math.round(audio.volume * 100);
      muteBtn.setAttribute('aria-pressed', 'false');
      muteBtn.querySelector('i').className = 'fa-solid fa-volume-low';
    } else {
      lastVolume = audio.volume;
      audio.muted = true;
      volumeSlider.value = 0;
      muteBtn.setAttribute('aria-pressed', 'true');
      muteBtn.querySelector('i').className = 'fa-solid fa-volume-xmark';
    }
  });

  maxVolBtn.addEventListener('click', () => {
    audio.muted = false;
    audio.volume = 1;
    volumeSlider.value = 100;
    lastVolume = 1;
    muteBtn.setAttribute('aria-pressed', 'false');
    muteBtn.querySelector('i').className = 'fa-solid fa-volume-low';
  });

  // Pause playback cleanly if the app/tab is backgrounded on some mobile
  // wrappers to avoid ghost audio sessions; comment out if background
  // playback is desired.
  document.addEventListener('visibilitychange', () => {
    if (document.hidden && audio.paused === false){
      // Intentionally left as no-op: keep playing in background like a real radio app.
    }
  });
})();
</script>

</body>
</html>
