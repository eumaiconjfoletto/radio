<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0d0d0d">
<meta name="color-scheme" content="dark">
<meta name="description" content="Rádio FM — ao vivo 24 horas por dia. Sua melhor companhia.">
<meta name="keywords" content="rádio, fm, música, ao vivo, streaming, notícias">
<meta name="robots" content="index,follow">
<title>Rádio FM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
<link rel="stylesheet" href="assets/css/variables.css">
<link rel="stylesheet" href="assets/css/base.css">
<link rel="stylesheet" href="assets/css/player-bar.css">
<script src="assets/js/theme.js" data-src="data/theme.json"></script>
</head>
<body>
<header>
  <div class="brand"><i class="fa-solid fa-radio"></i> <span id="brandName">RÁDIO FM</span></div>
  <button class="menu-toggle" id="menuToggle" aria-label="Abrir menu"><i class="fa-solid fa-bars"></i></button>
  <nav class="main-nav" id="mainNav">
    <button data-page="home.html" class="active">Início</button>
    <button data-page="programacao.html">Programação</button>
    <button data-page="noticias.html">Notícias</button>
    <button data-page="sobre.html">Sobre</button>
    <button data-page="contato.html">Contato</button>
  </nav>
</header>
<main>
  <iframe id="contentFrame" src="paginas/home.html" title="Conteúdo do site"></iframe>
  <div class="frame-loading" id="frameLoading">Carregando...</div>
</main>
<div class="player-bar">
  <div class="bar-cover">
    <img id="barCover" src="https://images.unsplash.com/photo-1493225457124-a3eb161ffa5f?w=200" alt="Capa">
  </div>
  <div class="bar-info">
    <div class="title" id="barTitle">Rádio FM</div>
    <div class="status" id="barStatus"><span class="dot live-dot"></span><span class="text">Toque em play</span></div>
  </div>
  <div class="bar-volume">
    <input type="range" id="barVolume" min="0" max="100" value="70" aria-label="Volume">
  </div>
  <div class="bar-controls">
    <button class="bar-btn" id="muteBtn" aria-label="Silenciar"><i class="fa-solid fa-volume-low"></i></button>
    <button class="bar-btn bar-play" id="playBtn" aria-label="Reproduzir" aria-pressed="false"><i class="fa-solid fa-play"></i></button>
  </div>
</div>
<audio id="radio" preload="none">
  <source src="https://usa13.fastcast4u.com/proxy/radioativa?mp=/1" type="audio/mpeg">
</audio>
<script src="assets/js/player-bar.js"></script>
</body>
</html>
