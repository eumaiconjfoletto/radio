<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="theme-color" content="#0d0d0d">
<meta name="color-scheme" content="dark">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Rádio FM">
<meta name="description" content="Player da Rádio FM — transmitindo ao vivo 24 horas por dia.">
<meta name="keywords" content="rádio, fm, player, música, ao vivo, streaming">
<title>Player • Rádio FM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
<link rel="stylesheet" href="assets/css/variables.css">
<link rel="stylesheet" href="assets/css/base.css">
<link rel="stylesheet" href="assets/css/app-player.css">
<script src="assets/js/theme.js" data-src="data/theme.json"></script>
</head>
<body>
<main class="player">
  <div class="logo">
    <i class="fa-solid fa-radio" aria-hidden="true"></i>
    <span>RÁDIO FM</span>
  </div>
  <div class="cover">
    <img src="https://images.unsplash.com/photo-1493225457124-a3eb161ffa5f?w=700" alt="Capa da Rádio FM" loading="lazy">
  </div>
  <div class="live">
    <span class="dot live-dot" aria-hidden="true"></span>
    AO VIVO
  </div>
  <div class="music" id="music">Rádio FM</div>
  <div class="artist" id="artist">Sua melhor companhia.</div>
  <div class="equalizer" id="equalizer" aria-hidden="true">
    <span></span><span></span><span></span><span></span><span></span>
  </div>
  <div class="controls">
    <button class="icon" id="muteBtn" aria-label="Silenciar" aria-pressed="false">
      <i class="fa-solid fa-volume-low" aria-hidden="true"></i>
    </button>
    <button class="play" id="play" aria-label="Reproduzir" aria-pressed="false">
      <i class="fa-solid fa-play" aria-hidden="true"></i>
    </button>
    <button class="icon" id="maxVolBtn" aria-label="Volume máximo">
      <i class="fa-solid fa-volume-high" aria-hidden="true"></i>
    </button>
  </div>
  <div class="volume">
    <input type="range" id="volume" min="0" max="100" value="70" aria-label="Volume">
  </div>
  <p class="status" id="status" role="status" aria-live="polite">Toque em play para ouvir</p>
  <div class="footer">Transmitindo 24 horas por dia</div>
  <nav class="nav-links">
    <a href="index.html#programacao"><i class="fa-solid fa-calendar-days" aria-hidden="true"></i> Programação</a>
    <a href="index.html#noticias"><i class="fa-solid fa-newspaper" aria-hidden="true"></i> Notícias</a>
  </nav>
  <audio id="radio" preload="none">
    <source src="" type="audio/mpeg">
  </audio>
</main>
<script src="assets/js/app-player.js"></script>
</body>
</html>
